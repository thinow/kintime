name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test-and-deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kintime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.17"

      - name: Run migrations (CI database)
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kintime_test

      - name: Run tests
        run: uv run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kintime_test

      - name: Run migrations (production database)
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@v1.5

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
